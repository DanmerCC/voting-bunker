<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Votación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" src="/src/vote.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-12"
      style="background:#07071a; background-image:radial-gradient(ellipse at 20% 50%,rgba(59,130,246,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,.04) 0%,transparent 60%); font-family:'Inter',system-ui,sans-serif;">

  <!-- Header -->
  <div class="text-center mb-10">
    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-xs text-slate-400 mb-6 tracking-widest uppercase">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
      Sistema activo
    </div>
    <h1 class="text-4xl font-bold text-white mb-3 tracking-tight">Sistema de Votación</h1>
    <p class="text-slate-400 text-sm max-w-xs mx-auto leading-relaxed">
      Selecciona tu candidato. Tu voto es anónimo y se registra una sola vez por sesión.
    </p>
  </div>

  <!-- Cards -->
  <div class="flex flex-col sm:flex-row gap-4 w-full max-w-2xl">

    <!-- JP -->
    <div class="vote-card vote-card-jp flex-1 bg-[#0d0d24] border border-white/8 rounded-2xl p-6 flex flex-col items-center gap-4">
      <div class="w-16 h-16 rounded-xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center">
        <span class="text-2xl font-bold text-blue-400">JP</span>
      </div>
      <div class="text-center">
        <p class="text-white font-semibold text-sm">Candidato JP</p>
        <p class="text-slate-500 text-xs mt-1">Opción A</p>
      </div>

      <!-- Barra de resultados JP -->
      <div class="w-full">
        <div class="flex justify-between items-center mb-1.5">
          <span id="count-jp" class="text-slate-500 text-xs tabular-nums">— votos</span>
          <span id="pct-jp"   class="text-blue-400/70 text-xs font-mono">—%</span>
        </div>
        <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
          <div id="bar-jp" class="result-bar h-full bg-blue-500/60 rounded-full" style="width:0%"></div>
        </div>
      </div>

      <button id="btn-jp" onclick="handleVote('jp')"
        class="relative w-full py-2.5 px-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium transition-colors duration-150 flex items-center justify-center gap-2 overflow-hidden">
        <span class="btn-label">Votar por JP</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- K -->
    <div class="vote-card vote-card-k flex-1 bg-[#0d0d24] border border-white/8 rounded-2xl p-6 flex flex-col items-center gap-4">
      <div class="w-16 h-16 rounded-xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center">
        <span class="text-2xl font-bold text-violet-400">K</span>
      </div>
      <div class="text-center">
        <p class="text-white font-semibold text-sm">Candidato K</p>
        <p class="text-slate-500 text-xs mt-1">Opción B</p>
      </div>

      <!-- Barra de resultados K -->
      <div class="w-full">
        <div class="flex justify-between items-center mb-1.5">
          <span id="count-k" class="text-slate-500 text-xs tabular-nums">— votos</span>
          <span id="pct-k"   class="text-violet-400/70 text-xs font-mono">—%</span>
        </div>
        <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
          <div id="bar-k" class="result-bar h-full bg-violet-500/60 rounded-full" style="width:0%"></div>
        </div>
      </div>

      <button id="btn-k" onclick="handleVote('k')"
        class="relative w-full py-2.5 px-4 rounded-xl bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium transition-colors duration-150 flex items-center justify-center gap-2 overflow-hidden">
        <span class="btn-label">Votar por K</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- Nulo -->
    <div class="vote-card vote-card-nulo flex-1 bg-[#0d0d24] border border-white/8 rounded-2xl p-6 flex flex-col items-center gap-4">
      <div class="w-16 h-16 rounded-xl bg-slate-500/10 border border-slate-500/20 flex items-center justify-center">
        <span class="text-lg font-bold text-slate-400">NULL</span>
      </div>
      <div class="text-center">
        <p class="text-white font-semibold text-sm">Voto Nulo</p>
        <p class="text-slate-500 text-xs mt-1">Opción C</p>
      </div>

      <!-- Barra de resultados Nulo -->
      <div class="w-full">
        <div class="flex justify-between items-center mb-1.5">
          <span id="count-nulo" class="text-slate-500 text-xs tabular-nums">— votos</span>
          <span id="pct-nulo"   class="text-slate-400/70 text-xs font-mono">—%</span>
        </div>
        <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
          <div id="bar-nulo" class="result-bar h-full bg-slate-500/60 rounded-full" style="width:0%"></div>
        </div>
      </div>

      <button id="btn-nulo" onclick="handleVote('nulo')"
        class="relative w-full py-2.5 px-4 rounded-xl bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium transition-colors duration-150 flex items-center justify-center gap-2 overflow-hidden">
        <span class="btn-label">Votar Nulo</span>
        <div class="spinner"></div>
      </button>
    </div>

  </div>

  <!-- Total de votos -->
  <div class="mt-8 flex flex-col items-center gap-1">
    <p id="total-votos" class="text-slate-500 text-xs tabular-nums"></p>
    <p id="last-updated" class="text-slate-700 text-xs"></p>
  </div>

  <p class="mt-6 text-slate-700 text-xs text-center">
    Protegido por Cloudflare Turnstile · Rate limiting activo
  </p>
</body>
</html>
