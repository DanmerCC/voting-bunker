<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elecciones 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script type="module" src="/src/vote.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-10"
      style="background:#05051a; background-image:radial-gradient(ellipse at 20% 40%,rgba(59,130,246,.10) 0%,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,.10) 0%,transparent 55%),radial-gradient(ellipse at 50% 100%,rgba(16,185,129,.06) 0%,transparent 50%); font-family:'Inter',system-ui,sans-serif;">

  <!-- Header -->
  <div class="text-center mb-10">
    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/30 text-xs text-emerald-400 mb-5 tracking-widest uppercase font-semibold">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
      EN VIVO
    </div>
    <h1 class="text-5xl sm:text-6xl font-black text-white mb-2 tracking-tight"
        style="text-shadow: 0 0 60px rgba(99,102,241,.4);">
      ELECCIONES <span style="background:linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">2026</span>
    </h1>
    <p class="text-slate-400 text-sm">Vota por tu candidato · Un voto por sesión</p>
  </div>

  <!-- Cards -->
  <div class="flex flex-col sm:flex-row gap-5 w-full max-w-3xl">

    <!-- JP -->
    <div class="vote-card vote-card-jp flex-1 rounded-2xl p-6 flex flex-col items-center gap-5"
         style="background:linear-gradient(145deg,#0d1a0d,#091209);border:1px solid rgba(34,197,94,.25);box-shadow:0 0 40px rgba(34,197,94,.08);">
      <!-- Icono -->
      <div class="w-20 h-20 rounded-2xl flex items-center justify-center relative"
           style="background:#fff;border:1px solid rgba(59,130,246,.4);box-shadow:0 0 30px rgba(59,130,246,.2);">
        <img src="/images/logo-jp.png" alt="JP" class="w-16 h-16 object-contain" />
      </div>
      <!-- Nombre -->
      <div class="text-center">
        <p class="text-white font-bold text-base tracking-wide">Candidato JP</p>
      </div>
      <!-- Contador -->
      <div class="flex flex-col items-center gap-0.5">
        <span id="count-jp" class="vote-count text-green-300 tabular-nums"
              style="font-size:3.5rem;font-weight:900;line-height:1;text-shadow:0 0 30px rgba(34,197,94,.7);">—</span>
        <span class="text-blue-400/50 text-xs uppercase tracking-widest font-semibold">votos</span>
      </div>
      <!-- Botón -->
      <button id="btn-jp" onclick="handleVote('jp')"
        class="relative w-full py-3 px-4 rounded-xl text-white font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 overflow-hidden"
        style="background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 4px 24px rgba(22,163,74,.4);">
        <span class="btn-label">⚡ VOTAR JP</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- K -->
    <div class="vote-card vote-card-k flex-1 rounded-2xl p-6 flex flex-col items-center gap-5"
         style="background:linear-gradient(145deg,#1a0f05,#120a03);border:1px solid rgba(234,88,12,.25);box-shadow:0 0 40px rgba(234,88,12,.08);">
      <div class="w-20 h-20 rounded-2xl flex items-center justify-center relative"
           style="background:#fff;border:1px solid rgba(234,88,12,.4);box-shadow:0 0 30px rgba(234,88,12,.2);">
        <img src="/images/logo-k.png" alt="K" class="w-16 h-16 object-contain" />
      </div>
      <div class="text-center">
        <p class="text-white font-bold text-base tracking-wide">Candidato K</p>
      </div>
      <div class="flex flex-col items-center gap-0.5">
        <span id="count-k" class="vote-count text-orange-300 tabular-nums"
              style="font-size:3.5rem;font-weight:900;line-height:1;text-shadow:0 0 30px rgba(234,88,12,.7);">—</span>
        <span class="text-violet-400/50 text-xs uppercase tracking-widest font-semibold">votos</span>
      </div>
      <button id="btn-k" onclick="handleVote('k')"
        class="relative w-full py-3 px-4 rounded-xl text-white font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 overflow-hidden"
        style="background:linear-gradient(135deg,#ea580c,#c2410c);box-shadow:0 4px 24px rgba(234,88,12,.4);">
        <span class="btn-label">⚡ VOTAR K</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- Nulo -->
    <div class="vote-card vote-card-nulo flex-1 rounded-2xl p-6 flex flex-col items-center gap-5"
         style="background:linear-gradient(145deg,#0f1018,#0c0d15);border:1px solid rgba(100,116,139,.25);box-shadow:0 0 40px rgba(100,116,139,.06);">
      <div class="w-20 h-20 rounded-2xl flex items-center justify-center relative"
           style="background:linear-gradient(135deg,rgba(100,116,139,.2),rgba(100,116,139,.05));border:1px solid rgba(100,116,139,.35);box-shadow:0 0 30px rgba(100,116,139,.15);">
        <span class="text-xl font-black text-slate-400">NULO</span>
        <div class="absolute inset-0 rounded-2xl" style="box-shadow:inset 0 0 20px rgba(100,116,139,.08);"></div>
      </div>
      <div class="text-center">
        <p class="text-white font-bold text-base tracking-wide">Voto Nulo</p>
      </div>
      <div class="flex flex-col items-center gap-0.5">
        <span id="count-nulo" class="vote-count text-slate-300 tabular-nums"
              style="font-size:3.5rem;font-weight:900;line-height:1;text-shadow:0 0 30px rgba(148,163,184,.4);">—</span>
        <span class="text-slate-400/50 text-xs uppercase tracking-widest font-semibold">votos</span>
      </div>
      <button id="btn-nulo" onclick="handleVote('nulo')"
        class="relative w-full py-3 px-4 rounded-xl text-white font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 overflow-hidden"
        style="background:linear-gradient(135deg,#374151,#1f2937);box-shadow:0 4px 24px rgba(55,65,81,.4);">
        <span class="btn-label">VOTO NULO</span>
        <div class="spinner"></div>
      </button>
    </div>

  </div>

  <!-- Total -->
  <div class="mt-8 flex flex-col items-center gap-1.5">
    <p id="total-votos" class="text-slate-300 text-lg font-bold tabular-nums"
       style="text-shadow:0 0 20px rgba(255,255,255,.1);"></p>
    <p id="last-updated" class="text-slate-600 text-xs"></p>
  </div>

  <p class="mt-8 text-slate-700 text-xs text-center">
    Protegido por Cloudflare · Resultados en tiempo real
  </p>
</body>
</html>
