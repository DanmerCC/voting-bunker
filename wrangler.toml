name       = "voting-bunker"
pages_build_output_dir = "dist"
compatibility_date     = "2024-01-01"

[vars]
ENVIRONMENT = "production"

# KV namespace para conteos de votos
# IDs se rellenan automáticamente por setup-kv.ps1
[[kv_namespaces]]
binding  = "VOTES"
id       = "KV_PROD_ID_PLACEHOLDER"
preview_id = "KV_PREVIEW_ID_PLACEHOLDER"
