<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificando voto...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: #07071a;
      background-image:
        radial-gradient(ellipse at 50% 40%, rgba(59, 130, 246, 0.06) 0%, transparent 60%);
    }

    /* ── Barra de progreso ── */
    #progress-fill {
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 60%, #06b6d4 100%);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    /* ── Checkmark SVG animado ── */
    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }
    .check-path {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw-check 0.5s ease-out 0.1s forwards;
    }

    /* ── Fade in ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease-out forwards; }

    /* ── Punto pulsante ── */
    @keyframes ping-slow {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.4); opacity: 0.5; }
    }
    .ping-slow { animation: ping-slow 1.4s ease-in-out infinite; }

    /* ── Estado final (oculto hasta completar) ── */
    #state-done { display: none; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm fade-up">

    <!-- Card principal -->
    <div class="bg-[#0d0d24] border border-white/8 rounded-2xl p-8 flex flex-col items-center gap-6">

      <!-- ── Estado: procesando ── -->
      <div id="state-loading" class="flex flex-col items-center gap-6 w-full">
        <div class="relative w-16 h-16">
          <!-- Anillo exterior pulsante -->
          <div class="absolute inset-0 rounded-full border border-blue-500/20 ping-slow"></div>
          <!-- Icono de candado/escudo -->
          <div class="w-16 h-16 rounded-full bg-blue-500/10 border border-blue-500/30 flex items-center justify-center">
            <svg class="w-7 h-7 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
            </svg>
          </div>
        </div>

        <div class="text-center">
          <h2 class="text-white font-semibold text-lg">Verificando tu voto</h2>
          <p id="status-text" class="text-slate-400 text-sm mt-1">Iniciando protocolo seguro...</p>
        </div>

        <!-- Barra de progreso -->
        <div class="w-full">
          <div class="flex justify-between items-center mb-2">
            <span class="text-slate-500 text-xs">Progreso</span>
            <span id="pct-label" class="text-slate-400 text-xs font-mono">0%</span>
          </div>
          <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
            <div id="progress-fill" class="h-full rounded-full"></div>
          </div>
        </div>

        <!-- Steps indicadores -->
        <div class="w-full flex flex-col gap-2">
          <div id="step-1" class="flex items-center gap-3 text-slate-500 text-xs">
            <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
            Validando token de sesión
          </div>
          <div id="step-2" class="flex items-center gap-3 text-slate-500 text-xs">
            <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
            Generando huella digital
          </div>
          <div id="step-3" class="flex items-center gap-3 text-slate-500 text-xs">
            <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
            Registrando en el búnker
          </div>
          <div id="step-4" class="flex items-center gap-3 text-slate-500 text-xs">
            <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
            Firmando con auditoría
          </div>
        </div>
      </div>

      <!-- ── Estado: completado ── -->
      <div id="state-done" class="flex flex-col items-center gap-4">
        <div class="w-16 h-16 rounded-full bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center">
          <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
            <path class="check-path" stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
          </svg>
        </div>
        <div class="text-center">
          <h2 class="text-white font-semibold text-lg">Voto registrado</h2>
          <p class="text-slate-400 text-sm mt-1">Tu participación ha sido contabilizada.</p>
        </div>
        <div class="text-xs text-slate-600 font-mono bg-white/3 border border-white/5 rounded-lg px-4 py-2 text-center">
          <span id="vote-ref">REF-········</span>
        </div>
      </div>

    </div>

    <!-- Aviso legal -->
    <p class="text-center text-slate-700 text-xs mt-6">
      Proceso auditado · Cloudflare Edge · <span id="ts-label"></span>
    </p>

  </div>

  <script>
    /* ════════════════════════════════════════════
       HISTORY HIJACKING
       Enmascara la URL real en la barra del navegador
    ════════════════════════════════════════════ */
    history.replaceState(null, '', '/verificacion-completada');

    /* ════════════════════════════════════════════
       TRAMPA DEL BOTÓN ATRÁS
       Inyecta un estado extra y lo "consume" en popstate,
       forzando al usuario a quedarse en esta vista.
    ════════════════════════════════════════════ */
    history.pushState({ trapped: true }, '');

    window.addEventListener('popstate', function (e) {
      // Re-inyectar la trampa y reiniciar la animación
      history.pushState({ trapped: true }, '');
      resetAnimation();
    });

    /* ════════════════════════════════════════════
       ANIMACIÓN NO LINEAL DE LA BARRA DE PROGRESO
       Simula etapas de procesamiento real:
       rápido → lento → lento → burst final
    ════════════════════════════════════════════ */
    const fill    = document.getElementById('progress-fill');
    const pctLbl  = document.getElementById('pct-label');
    const statusT = document.getElementById('status-text');

    // Cada etapa: [porcentaje destino, duración ms, mensaje, stepId]
    const STAGES = [
      { target: 28,  ms: 700,  msg: 'Validando token de sesión...',  step: 'step-1' },
      { target: 55,  ms: 1000, msg: 'Generando huella digital...',   step: 'step-2' },
      { target: 80,  ms: 900,  msg: 'Registrando en el búnker...',   step: 'step-3' },
      { target: 94,  ms: 700,  msg: 'Firmando con auditoría...',     step: 'step-4' },
      { target: 100, ms: 400,  msg: 'Completando...',                step: null    },
    ];

    let currentPct = 0;
    let stageIndex = 0;
    let stageTimer = null;

    function activateStep(stepId) {
      if (!stepId) return;
      const el = document.getElementById(stepId);
      if (!el) return;
      el.classList.remove('text-slate-500');
      el.classList.add('text-blue-400');
      el.querySelector('div').classList.remove('bg-slate-600');
      el.querySelector('div').classList.add('bg-blue-400');
    }

    function markStepDone(stepId) {
      if (!stepId) return;
      const el = document.getElementById(stepId);
      if (!el) return;
      el.classList.replace('text-blue-400', 'text-emerald-400');
      el.querySelector('div').classList.replace('bg-blue-400', 'bg-emerald-400');
    }

    function animateTo(target, durationMs, onDone) {
      const start    = currentPct;
      const delta    = target - start;
      const startTs  = performance.now();

      function tick(now) {
        const elapsed = now - startTs;
        const t = Math.min(elapsed / durationMs, 1);
        // Easing: easeInOutQuad para movimiento no lineal
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        currentPct = start + delta * eased;
        fill.style.width = currentPct + '%';
        pctLbl.textContent = Math.round(currentPct) + '%';

        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          currentPct = target;
          fill.style.width = target + '%';
          pctLbl.textContent = target + '%';
          if (onDone) onDone();
        }
      }
      requestAnimationFrame(tick);
    }

    function runStage(index) {
      if (index >= STAGES.length) {
        onComplete();
        return;
      }
      const prev  = STAGES[index - 1];
      const stage = STAGES[index];

      if (prev && prev.step) markStepDone(prev.step);
      if (stage.step) activateStep(stage.step);
      statusT.textContent = stage.msg;

      animateTo(stage.target, stage.ms, () => {
        stageIndex = index + 1;
        stageTimer = setTimeout(() => runStage(stageIndex), 120);
      });
    }

    function onComplete() {
      // Marcar último step
      const last = STAGES[STAGES.length - 2];
      if (last && last.step) markStepDone(last.step);

      // Generar referencia falsa de auditoría
      const ref = 'REF-' + Math.random().toString(36).slice(2, 10).toUpperCase();
      document.getElementById('vote-ref').textContent = ref;
      document.getElementById('ts-label').textContent = new Date().toLocaleTimeString('es-ES');

      // Swap de estados
      setTimeout(() => {
        document.getElementById('state-loading').style.display = 'none';
        const done = document.getElementById('state-done');
        done.style.display = 'flex';
        done.style.flexDirection = 'column';
        done.style.alignItems = 'center';
        done.style.gap = '1rem';
      }, 300);
    }

    function resetAnimation() {
      // Reinicia todo para la trampa del botón atrás
      clearTimeout(stageTimer);
      currentPct = 0;
      stageIndex = 0;
      fill.style.width = '0%';
      pctLbl.textContent = '0%';
      statusT.textContent = 'Iniciando protocolo seguro...';

      // Resetear steps
      ['step-1','step-2','step-3','step-4'].forEach(id => {
        const el = document.getElementById(id);
        el.className = 'flex items-center gap-3 text-slate-500 text-xs';
        el.querySelector('div').className = 'w-1.5 h-1.5 rounded-full bg-slate-600';
      });

      // Mostrar estado loading si estaba en done
      document.getElementById('state-loading').style.display = 'flex';
      document.getElementById('state-done').style.display = 'none';

      setTimeout(() => runStage(0), 200);
    }

    /* ── Arrancar ── */
    setTimeout(() => runStage(0), 300);
  </script>
</body>
</html>
