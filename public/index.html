<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Votación</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: #07071a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 60%);
    }

    /* ── Spinner CSS puro ── */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-loading .spinner { display: inline-block; }
    .btn-loading .btn-label { opacity: 0; position: absolute; }

    /* ── Card hover glow ── */
    .vote-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .vote-card:hover {
      transform: translateY(-2px);
    }
    .vote-card-jp:hover  { box-shadow: 0 0 24px rgba(59, 130, 246, 0.18); border-color: rgba(59, 130, 246, 0.5) !important; }
    .vote-card-k:hover   { box-shadow: 0 0 24px rgba(139, 92, 246, 0.18); border-color: rgba(139, 92, 246, 0.5) !important; }
    .vote-card-nulo:hover{ box-shadow: 0 0 24px rgba(100, 116, 139, 0.18); border-color: rgba(100, 116, 139, 0.5) !important; }

    /* ── Pulse ring al hacer clic ── */
    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .ripple-ring {
      position: absolute; inset: 0;
      border-radius: inherit;
      animation: ripple 0.6s ease-out forwards;
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-12">

  <!-- Header -->
  <div class="text-center mb-12">
    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-xs text-slate-400 mb-6 tracking-widest uppercase">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
      Sistema activo
    </div>
    <h1 class="text-4xl font-bold text-white mb-3 tracking-tight">Sistema de Votación</h1>
    <p class="text-slate-400 text-sm max-w-xs mx-auto leading-relaxed">
      Selecciona tu candidato. Tu voto es anónimo y se registra una sola vez por sesión.
    </p>
  </div>

  <!-- Cards de votación -->
  <div class="flex flex-col sm:flex-row gap-4 w-full max-w-2xl">

    <!-- JP -->
    <div class="vote-card vote-card-jp flex-1 bg-[#0d0d24] border border-white/8 rounded-2xl p-6 flex flex-col items-center gap-5">
      <div class="w-16 h-16 rounded-xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center">
        <span class="text-2xl font-bold text-blue-400">JP</span>
      </div>
      <div class="text-center">
        <p class="text-white font-semibold text-sm">Candidato JP</p>
        <p class="text-slate-500 text-xs mt-1">Opción A</p>
      </div>
      <button
        id="btn-jp"
        onclick="handleVote('jp')"
        class="relative w-full py-2.5 px-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium
               transition-colors duration-150 flex items-center justify-center gap-2 overflow-hidden"
      >
        <span class="btn-label">Votar por JP</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- K -->
    <div class="vote-card vote-card-k flex-1 bg-[#0d0d24] border border-white/8 rounded-2xl p-6 flex flex-col items-center gap-5">
      <div class="w-16 h-16 rounded-xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center">
        <span class="text-2xl font-bold text-violet-400">K</span>
      </div>
      <div class="text-center">
        <p class="text-white font-semibold text-sm">Candidato K</p>
        <p class="text-slate-500 text-xs mt-1">Opción B</p>
      </div>
      <button
        id="btn-k"
        onclick="handleVote('k')"
        class="relative w-full py-2.5 px-4 rounded-xl bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium
               transition-colors duration-150 flex items-center justify-center gap-2 overflow-hidden"
      >
        <span class="btn-label">Votar por K</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- Nulo -->
    <div class="vote-card vote-card-nulo flex-1 bg-[#0d0d24] border border-white/8 rounded-2xl p-6 flex flex-col items-center gap-5">
      <div class="w-16 h-16 rounded-xl bg-slate-500/10 border border-slate-500/20 flex items-center justify-center">
        <span class="text-lg font-bold text-slate-400">NULL</span>
      </div>
      <div class="text-center">
        <p class="text-white font-semibold text-sm">Voto Nulo</p>
        <p class="text-slate-500 text-xs mt-1">Opción C</p>
      </div>
      <button
        id="btn-nulo"
        onclick="handleVote('nulo')"
        class="relative w-full py-2.5 px-4 rounded-xl bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium
               transition-colors duration-150 flex items-center justify-center gap-2 overflow-hidden"
      >
        <span class="btn-label">Votar Nulo</span>
        <div class="spinner"></div>
      </button>
    </div>

  </div>

  <!-- Footer -->
  <p class="mt-12 text-slate-600 text-xs text-center">
    Protegido por Cloudflare Turnstile · Rate limiting activo
  </p>

  <script>
    /* ── Constantes de configuración ── */
    const WORKER_BASE   = '/votar';
    const TOKEN_KEY     = '__analytics_secure_token_v2';
    const TOKEN_VALUE   = 'ControlS3cr3t0!';
    const SESSION_PFX   = '_ga_session_metrics_';
    const PLACEBO_DELAY = 600; // ms de latencia artificial

    /* ── Hora actual (se resetea cada hora) ── */
    function currentHour() {
      return new Date().getHours();
    }

    /* ── Clave de sesión por opción y hora ── */
    function sessionKey(opcion) {
      return `${SESSION_PFX}${opcion}_${currentHour()}`;
    }

    /* ── ¿El usuario ya votó en esta hora? (Shadow Blocking) ── */
    function isShadowBlocked(opcion) {
      return localStorage.getItem(sessionKey(opcion)) !== null;
    }

    /* ── ¿Está activo el Modo Búnker? ── */
    function isBunkerMode() {
      return localStorage.getItem(TOKEN_KEY) === TOKEN_VALUE;
    }

    /* ── Construye la URL de destino con o sin ruido ── */
    function buildVoteUrl(opcion) {
      const base = `${WORKER_BASE}/${opcion}`;
      return isBunkerMode() ? `${base}X` : base;
    }

    /* ── Promesa de espera ── */
    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    /* ── Activa el estado de carga en el botón (UX Placebo) ── */
    function setLoading(btn) {
      btn.classList.add('btn-loading');

      // Efecto ripple
      const ring = document.createElement('div');
      ring.className = 'ripple-ring border-2 border-current opacity-40';
      btn.appendChild(ring);
      setTimeout(() => ring.remove(), 700);
    }

    /* ── Flujo principal de votación ── */
    async function handleVote(opcion) {
      const btn = document.getElementById(`btn-${opcion}`);

      // Placebo: activar spinner (botón NO se deshabilita)
      setLoading(btn);

      // Latencia artificial
      await delay(PLACEBO_DELAY);

      if (!isShadowBlocked(opcion)) {
        // Petición real al Worker
        try {
          await fetch(buildVoteUrl(opcion), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
          });
        } catch (_) {
          // Silencioso: siempre redirigimos
        }

        // Marcar en localStorage para shadow-block en la misma hora
        localStorage.setItem(sessionKey(opcion), '1');
      }
      // Si estaba shadow-blocked: no hacemos fetch, pero sí redirigimos

      // Redirigir SIEMPRE (real o placebo)
      window.location.href = '/validando-voto';
    }
  </script>
</body>
</html>
